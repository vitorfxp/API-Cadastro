<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tabela de ninjas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a1628 0%, #1a3a5c 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        h1 {
            text-align: center;
            color: #e0f0ff;
            font-size: 2rem;
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(56, 182, 255, 0.5);
        }

        .table-container {
            max-width: 1300px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 40px rgba(0, 100, 200, 0.3);
            border: 1px solid rgba(56, 182, 255, 0.2);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: linear-gradient(90deg, #0d47a1, #1565c0, #1976d2);
        }

        thead th {
            color: #e3f2fd;
            padding: 16px 18px;
            text-align: left;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            border-bottom: 2px solid rgba(56, 182, 255, 0.4);
        }

        tbody tr {
            transition: background 0.2s ease;
            border-bottom: 1px solid rgba(56, 182, 255, 0.1);
        }

        tbody tr:nth-child(even) {
            background: rgba(21, 101, 192, 0.08);
        }

        tbody tr:hover {
            background: rgba(56, 182, 255, 0.15);
        }

        tbody td {
            padding: 14px 18px;
            color: #cce4ff;
            font-size: 0.92rem;
            vertical-align: middle;
        }

        /* Badge de missão */
        .missao-container {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .missao-nome {
            display: inline-block;
            background: rgba(21, 101, 192, 0.45);
            border: 1px solid rgba(56, 182, 255, 0.35);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 0.82rem;
            font-weight: 600;
            color: #90caf9;
        }

        .missao-descricao {
            display: inline-block;
            background: rgba(21, 101, 192, 0.2);
            border: 1px solid rgba(56, 182, 255, 0.15);
            border-radius: 20px;
            padding: 3px 12px;
            font-size: 0.78rem;
            color: #7ab3d9;
            font-style: italic;
        }

        .sem-missao {
            color: #546e7a;
            font-style: italic;
            font-size: 0.85rem;
        }

        /* Botões de ação */
        .acoes {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s ease;
            cursor: pointer;
            border: none;
            letter-spacing: 0.5px;
        }

        .btn-alterar {
            background: rgba(25, 118, 210, 0.3);
            color: #64b5f6;
            border: 1px solid rgba(100, 181, 246, 0.4);
        }

        .btn-alterar:hover {
            background: rgba(25, 118, 210, 0.6);
            color: #fff;
        }

        .btn-detalhes {
            background: rgba(0, 150, 136, 0.2);
            color: #4db6ac;
            border: 1px solid rgba(77, 182, 172, 0.4);
        }

        .btn-detalhes:hover {
            background: rgba(0, 150, 136, 0.5);
            color: #fff;
        }

        .btn-deletar {
            background: rgba(183, 28, 28, 0.2);
            color: #ef9a9a;
            border: 1px solid rgba(239, 154, 154, 0.4);
        }

        .btn-deletar:hover {
            background: rgba(183, 28, 28, 0.5);
            color: #fff;
        }
    </style>
</head>
<body>

<h1>Lista de Ninjas</h1>

<div class="table-container">
    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Email</th>
            <th>Idade</th>
            <th>Nível</th>
            <th>Aldeia</th>
            <th>Habilidade Especial</th>
            <th>Missão</th>
            <th>Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="ninja : ${ninjas}">
            <td th:text="${ninja.id}"></td>
            <td th:text="${ninja.nome}"></td>
            <td th:text="${ninja.email}"></td>
            <td th:text="${ninja.idade}"></td>
            <td th:text="${ninja.nivel}"></td>
            <td th:text="${ninja.aldeia}"></td>
            <td th:text="${ninja.habilidadeEspecial}"></td>
            <td>
                <div class="missao-container" th:if="${ninja.missoes != null}">
                    <span class="missao-nome" th:text="${ninja.missoes.nome}"></span>
                    <span class="missao-descricao" th:text="${ninja.missoes.descricao}"></span>
                </div>
                <span class="sem-missao" th:if="${ninja.missoes == null}">Sem missões atribuídas</span>
            </td>
            <td class="acoes">
                <a class="btn btn-alterar" th:href="@{/ninja/ui/#/{id}(id=${ninja.id})}">Alterar</a>
                <a class="btn btn-detalhes" th:href="@{/ninja/ui/listar/{id}(id=${ninja.id})}">Ver detalhes</a>
                <a class="btn btn-deletar" th:href="@{/ninja/ui/deletar/{id}(id=${ninja.id})}">Deletar</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
