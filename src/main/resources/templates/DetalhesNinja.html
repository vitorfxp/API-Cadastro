<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Detalhes do Ninja</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a1628 0%, #1a3a5c 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        h1 {
            text-align: center;
            color: #e0f0ff;
            font-size: 2rem;
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(56, 182, 255, 0.5);
        }

        .card-container {
            max-width: 700px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 40px rgba(0, 100, 200, 0.3);
            border: 1px solid rgba(56, 182, 255, 0.2);
        }

        .card-header {
            background: linear-gradient(90deg, #0d47a1, #1565c0, #1976d2);
            padding: 24px 30px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: rgba(56, 182, 255, 0.2);
            border: 2px solid rgba(56, 182, 255, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: #90caf9;
            flex-shrink: 0;
        }

        .card-header-info h2 {
            color: #e3f2fd;
            font-size: 1.4rem;
            letter-spacing: 1px;
        }

        .card-header-info span {
            color: #90caf9;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        .card-body {
            padding: 10px 0;
        }

        .detail-row {
            display: flex;
            align-items: center;
            padding: 16px 30px;
            border-bottom: 1px solid rgba(56, 182, 255, 0.08);
            transition: background 0.2s;
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-row:hover {
            background: rgba(56, 182, 255, 0.07);
        }

        .detail-label {
            width: 180px;
            flex-shrink: 0;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: #4a90d9;
        }

        .detail-value {
            color: #cce4ff;
            font-size: 0.95rem;
        }

        .nivel-badge {
            display: inline-block;
            background: rgba(21, 101, 192, 0.45);
            border: 1px solid rgba(56, 182, 255, 0.35);
            border-radius: 20px;
            padding: 4px 14px;
            font-size: 0.82rem;
            font-weight: 600;
            color: #90caf9;
        }

        .missao-container {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .missao-nome {
            display: inline-block;
            background: rgba(21, 101, 192, 0.45);
            border: 1px solid rgba(56, 182, 255, 0.35);
            border-radius: 20px;
            padding: 4px 14px;
            font-size: 0.82rem;
            font-weight: 600;
            color: #90caf9;
        }

        .missao-descricao {
            display: inline-block;
            background: rgba(21, 101, 192, 0.2);
            border: 1px solid rgba(56, 182, 255, 0.15);
            border-radius: 20px;
            padding: 3px 14px;
            font-size: 0.78rem;
            color: #7ab3d9;
            font-style: italic;
        }

        .sem-missao {
            color: #546e7a;
            font-style: italic;
            font-size: 0.85rem;
        }

        .card-footer {
            padding: 20px 30px;
            background: rgba(0, 0, 0, 0.15);
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            border-top: 1px solid rgba(56, 182, 255, 0.1);
        }

        .btn {
            padding: 8px 20px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s ease;
            cursor: pointer;
            border: none;
            letter-spacing: 0.5px;
        }

        .btn-voltar {
            background: rgba(25, 118, 210, 0.3);
            color: #64b5f6;
            border: 1px solid rgba(100, 181, 246, 0.4);
        }

        .btn-voltar:hover {
            background: rgba(25, 118, 210, 0.6);
            color: #fff;
        }

        .btn-alterar {
            background: rgba(0, 150, 136, 0.2);
            color: #4db6ac;
            border: 1px solid rgba(77, 182, 172, 0.4);
        }

        .btn-alterar:hover {
            background: rgba(0, 150, 136, 0.5);
            color: #fff;
        }

        .btn-deletar {
            background: rgba(183, 28, 28, 0.2);
            color: #ef9a9a;
            border: 1px solid rgba(239, 154, 154, 0.4);
        }

        .btn-deletar:hover {
            background: rgba(183, 28, 28, 0.5);
            color: #fff;
        }
    </style>
</head>
<body>

<h1>Detalhes do Ninja</h1>

<div class="card-container">

    <div class="card-header">
        <div class="avatar">🥷</div>
        <div class="card-header-info">
            <h2 th:text="${ninja.nome}">Nome do Ninja</h2>
            <span th:text="'#' + ${ninja.id} + ' · ' + ${ninja.nivel}">ID · Nível</span>
        </div>
    </div>

    <div class="card-body">

        <div class="detail-row">
            <span class="detail-label">ID</span>
            <span class="detail-value" th:text="${ninja.id}"></span>
        </div>

        <div class="detail-row">
            <span class="detail-label">Nome</span>
            <span class="detail-value" th:text="${ninja.nome}"></span>
        </div>

        <div class="detail-row">
            <span class="detail-label">Email</span>
            <span class="detail-value" th:text="${ninja.email}"></span>
        </div>

        <div class="detail-row">
            <span class="detail-label">Idade</span>
            <span class="detail-value" th:text="${ninja.idade} + ' anos'"></span>
        </div>

        <div class="detail-row">
            <span class="detail-label">Nível</span>
            <span class="detail-value">
                <span class="nivel-badge" th:text="${ninja.nivel}"></span>
            </span>
        </div>

        <div class="detail-row">
            <span class="detail-label">Aldeia</span>
            <span class="detail-value" th:text="${ninja.aldeia}"></span>
        </div>

        <div class="detail-row">
            <span class="detail-label">Hab. Especial</span>
            <span class="detail-value" th:text="${ninja.habilidadeEspecial}"></span>
        </div>

        <div class="detail-row">
            <span class="detail-label">Missão</span>
            <span class="detail-value">
                <div class="missao-container" th:if="${ninja.missoes != null}">
                    <span class="missao-nome" th:text="${ninja.missoes.nome}"></span>
                    <span class="missao-descricao" th:text="${ninja.missoes.descricao}"></span>
                </div>
                <span class="sem-missao" th:if="${ninja.missoes == null}">Sem missões atribuídas</span>
            </span>
        </div>

    </div>

    <div class="card-footer">
        <a class="btn btn-voltar" th:href="@{/ninja/ui/listar}">← Voltar</a>
        <a class="btn btn-alterar">Alterar</a>
        <a class="btn btn-deletar" th:href="@{/ninja/ui/deletar/{id}(id=${ninja.id})}">Deletar</a>
    </div>

</div>

</body>
</html>
